<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Summary</title>
  <style>
    :root {
      --bg: #f7fafc;
      --card: #ffffff;
      --line: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --ok: #0f766e;
      --bad: #b91c1c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1100px; margin: 20px auto; padding: 0 12px 20px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
    .top { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .pill { border: 1px solid var(--line); border-radius: 999px; padding: 5px 10px; font-size: 12px; color: var(--muted); }
    .row { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    h1 { margin: 0; font-size: 22px; }
    h2 { margin: 0 0 8px; font-size: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; }
    .metric { border: 1px solid var(--line); border-radius: 10px; padding: 10px; }
    .k { color: var(--muted); font-size: 12px; }
    .v { font-size: 20px; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { border-bottom: 1px solid var(--line); text-align: left; padding: 6px; }
    th { color: var(--muted); font-weight: 600; }
    #status { font-family: Consolas, monospace; font-size: 12px; min-height: 20px; margin-top: 6px; }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .day-filters { margin: 8px 0; display: flex; gap: 6px; flex-wrap: wrap; }
    .day-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .day-btn.active {
      border-color: #0f766e;
      background: #ecfdf5;
      color: #065f46;
      font-weight: 700;
    }
    .del-btn {
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #b91c1c;
      border-radius: 999px;
      width: 24px;
      height: 24px;
      line-height: 20px;
      text-align: center;
      padding: 0;
      font-weight: 700;
      cursor: pointer;
    }
    .del-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    .auth-state {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: #fff;
    }
    .auth-state.in {
      border-color: #0f766e;
      background: #ecfdf5;
      color: #065f46;
      font-weight: 700;
    }
    .auth-state.out {
      border-color: #fca5a5;
      background: #fff1f2;
      color: #991b1b;
      font-weight: 700;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <h1>Summary</h1>
        <a class="pill" href="/">home</a>
        <a class="pill" href="/my-rules.html">my rules</a>
        <a class="pill" href="/run-trace.html">run trace</a>
        <a class="pill" href="/health.html">health runner</a>
      </div>
      <div class="row">
        <span id="who" class="pill">Not logged in</span>
        <span id="authState" class="auth-state out">Logged OUT</span>
        <button id="logoutBtn" type="button" disabled>Logout</button>
      </div>
      <div class="row">
        <label for="days" class="k">Window days</label>
        <input id="days" type="number" min="1" max="31" value="8" style="width:80px; padding:6px;" />
        <button id="refresh">Refresh</button>
      </div>
      <div id="googleSignIn" style="margin-top:8px;"></div>
      <div id="status"></div>
    </div>

    <div class="card">
      <h2>Overview</h2>
      <div class="grid" id="overview"></div>
    </div>

    <div class="card">
      <h2>By Type</h2>
      <table id="byTypeTable"><thead><tr><th>Type</th><th>Window Count</th><th>Today Count</th></tr></thead><tbody></tbody></table>
    </div>

    <div class="card">
      <h2>Value Breakdown</h2>
      <table id="valueTable"><thead><tr><th>Type</th><th>Numeric values</th><th>Text values</th></tr></thead><tbody></tbody></table>
    </div>

    <div class="card">
      <h2>Recent Entries</h2>
      <div id="dayFilters" class="day-filters"></div>
      <table id="recentTable"><thead><tr><th>Ora</th><th>Type</th><th>Num</th><th>Text</th><th>Del</th></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <script>
    let googleToken = "";
    const TOKEN_STORAGE_KEY = "aa_google_id_token";
    const statusNode = document.getElementById("status");
    const whoNode = document.getElementById("who");
    const authStateNode = document.getElementById("authState");
    const logoutBtn = document.getElementById("logoutBtn");
    const googleSignInNode = document.getElementById("googleSignIn");
    const dayFiltersNode = document.getElementById("dayFilters");
    const APP_TIMEZONE = "Europe/Zurich";
    let recentRowsState = [];
    let selectedDayKey = "";

    function setAuthState(email) {
      if (email) {
        whoNode.textContent = `Logged in: ${email}`;
        authStateNode.textContent = "Logged IN";
        authStateNode.className = "auth-state in";
        googleSignInNode.style.display = "none";
        logoutBtn.disabled = false;
        return;
      }
      whoNode.textContent = "Not logged in";
      authStateNode.textContent = "Logged OUT";
      authStateNode.className = "auth-state out";
      googleSignInNode.style.display = "block";
      logoutBtn.disabled = true;
    }

    function setStatus(ok, txt) {
      statusNode.className = ok ? "ok" : "bad";
      statusNode.textContent = txt;
    }

    async function api(path, opts) {
      const r = await fetch(path, opts);
      const t = await r.text();
      let b = t;
      try { b = JSON.parse(t); } catch (_) {}
      return { ok: r.ok, status: r.status, body: b };
    }

    function pairsToText(obj) {
      const entries = Object.entries(obj || {});
      if (!entries.length) return "-";
      return entries.map(([k, v]) => `${k}(${v})`).join(", ");
    }

    function dateKeyInTz(value) {
      const dt = new Date(String(value || ""));
      if (Number.isNaN(dt.getTime())) return "";
      const parts = new Intl.DateTimeFormat("sv-SE", {
        timeZone: APP_TIMEZONE,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(dt);
      const y = parts.find((p) => p.type === "year")?.value || "0000";
      const m = parts.find((p) => p.type === "month")?.value || "00";
      const d = parts.find((p) => p.type === "day")?.value || "00";
      return `${y}-${m}-${d}`;
    }

    function timeInTz(value) {
      const dt = new Date(String(value || ""));
      if (Number.isNaN(dt.getTime())) return "";
      return new Intl.DateTimeFormat("it-CH", {
        timeZone: APP_TIMEZONE,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(dt);
    }

    function dayDiffFromToday(dayKey) {
      const today = dateKeyInTz(new Date().toISOString());
      const toDate = (k) => new Date(`${k}T00:00:00Z`);
      const ms = toDate(today).getTime() - toDate(dayKey).getTime();
      return Math.floor(ms / 86400000);
    }

    function renderRecentRows() {
      const recentBody = document.querySelector("#recentTable tbody");
      recentBody.innerHTML = "";
      const filtered = getFilteredRecentRows();
      if (!filtered.length) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="5" class="k">Nessuna entry per questo giorno</td>`;
        recentBody.appendChild(tr);
        return;
      }
      filtered.forEach((row) => {
        const tr = document.createElement("tr");
        const rowId = row.id || "";
        const delBtn = rowId ? `<button class="del-btn" data-id="${rowId}" title="Delete">X</button>` : "";
        tr.innerHTML = `<td>${timeInTz(row.created_at)}</td><td>${row.type || ""}</td><td>${row.value_num ?? ""}</td><td>${row.value_text ?? ""}</td><td>${delBtn}</td>`;
        recentBody.appendChild(tr);
      });
    }

    function getFilteredRecentRows() {
      return selectedDayKey
        ? recentRowsState.filter((row) => dateKeyInTz(row.created_at) === selectedDayKey)
        : recentRowsState;
    }

    function renderRecentView() {
      renderRecentRows();
    }

    function renderDayFilters() {
      dayFiltersNode.innerHTML = "";
      const uniqueDays = Array.from(new Set(recentRowsState.map((row) => dateKeyInTz(row.created_at)).filter(Boolean)));
      uniqueDays.sort((a, b) => (a < b ? 1 : -1));
      if (!uniqueDays.length) return;

      if (!selectedDayKey || !uniqueDays.includes(selectedDayKey)) {
        selectedDayKey = uniqueDays[0];
      }

      uniqueDays.forEach((dayKey) => {
        const diff = dayDiffFromToday(dayKey);
        let label = dayKey;
        if (diff === 0) label = "oggi";
        else if (diff > 0) label = `-${diff}`;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `day-btn${dayKey === selectedDayKey ? " active" : ""}`;
        btn.textContent = label;
        btn.title = dayKey;
        btn.addEventListener("click", () => {
          selectedDayKey = dayKey;
          renderDayFilters();
          renderRecentView();
        });
        dayFiltersNode.appendChild(btn);
      });
    }

    function render(data) {
      document.getElementById("overview").innerHTML = `
        <div class="metric"><div class="k">Window Days</div><div class="v">${data.window_days}</div></div>
        <div class="metric"><div class="k">Total Entries</div><div class="v">${data.total_entries}</div></div>
        <div class="metric"><div class="k">Coffee Today</div><div class="v">${data.coffee_today}</div></div>
        <div class="metric"><div class="k">From</div><div class="k">${data.from}</div><div class="k">To ${data.to}</div></div>
      `;

      const byTypeBody = document.querySelector("#byTypeTable tbody");
      byTypeBody.innerHTML = "";
      const types = Array.from(new Set([...Object.keys(data.by_type || {}), ...Object.keys(data.today_by_type || {})])).sort();
      types.forEach((type) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${type}</td><td>${data.by_type?.[type] || 0}</td><td>${data.today_by_type?.[type] || 0}</td>`;
        byTypeBody.appendChild(tr);
      });

      const valueBody = document.querySelector("#valueTable tbody");
      valueBody.innerHTML = "";
      Object.entries(data.by_type_values || {}).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([type, vals]) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${type}</td><td>${pairsToText(vals.num)}</td><td>${pairsToText(vals.text)}</td>`;
        valueBody.appendChild(tr);
      });

      recentRowsState = (data.recent_entries || []).slice().sort((a, b) => {
        const aTs = Date.parse(String(a.created_at || ""));
        const bTs = Date.parse(String(b.created_at || ""));
        return (Number.isNaN(bTs) ? 0 : bTs) - (Number.isNaN(aTs) ? 0 : aTs);
      });
      renderDayFilters();
      renderRecentView();
    }

    async function deleteEntryById(id) {
      const ok = window.confirm("Cancellare questa registrazione?");
      if (!ok) return;
      const r = await api(`/things-mine/${id}`, {
        method: "DELETE",
        headers: { "Authorization": `Bearer ${googleToken}` },
      });
      if (!r.ok) {
        setStatus(false, `Delete failed (${r.status})`);
        return;
      }
      setStatus(true, `Deleted ${id}`);
      await loadSummary();
    }

    async function loadSummary() {
      if (!googleToken) {
        setStatus(false, "Login required");
        return;
      }
      const days = Number(document.getElementById("days").value || 8);
      const r = await api(`/things/summary-window?days=${days}`, {
        method: "GET",
        headers: { "Authorization": `Bearer ${googleToken}` },
      });
      if (!r.ok) {
        setStatus(false, `Summary failed (${r.status})`);
        return;
      }
      render(r.body);
      setStatus(true, "Summary loaded");
    }

    async function onGoogleCredential(response) {
      const token = response.credential || "";
      const verify = await api("/auth/google/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id_token: token }),
      });
      if (!verify.ok) {
        setStatus(false, "Google login failed");
        localStorage.removeItem(TOKEN_STORAGE_KEY);
        setAuthState(null);
        return;
      }
      googleToken = token;
      localStorage.setItem(TOKEN_STORAGE_KEY, token);
      setAuthState(verify.body.email);
      await loadSummary();
    }

    async function tryStoredLogin() {
      const stored = localStorage.getItem(TOKEN_STORAGE_KEY);
      if (!stored) {
        return false;
      }
      const verify = await api("/auth/google/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id_token: stored }),
      });
      if (!verify.ok) {
        localStorage.removeItem(TOKEN_STORAGE_KEY);
        setAuthState(null);
        return false;
      }
      googleToken = stored;
      setAuthState(verify.body.email);
      await loadSummary();
      return true;
    }

    function logout() {
      googleToken = "";
      localStorage.removeItem(TOKEN_STORAGE_KEY);
      setAuthState(null);
      setStatus(true, "Logout eseguito.");
    }

    async function bootstrap() {
      const cfg = await api("/auth/google/client-id", { method: "GET" });
      const clientId = cfg.ok ? cfg.body.client_id : "";
      if (!clientId) {
        setStatus(false, "GOOGLE_CLIENT_ID not configured");
        return;
      }
      google.accounts.id.initialize({ client_id: clientId, callback: onGoogleCredential });
      google.accounts.id.renderButton(document.getElementById("googleSignIn"), { theme: "outline", size: "large" });
      const restored = await tryStoredLogin();
      if (!restored) {
        setAuthState(null);
        setStatus(true, "Waiting for Google login...");
      }
    }

    window.addEventListener("load", () => {
      document.getElementById("refresh").addEventListener("click", loadSummary);
      logoutBtn.addEventListener("click", logout);
      document.querySelector("#recentTable tbody").addEventListener("click", (ev) => {
        const target = ev.target;
        if (!(target instanceof HTMLElement)) return;
        const id = target.dataset.id;
        if (!id) return;
        deleteEntryById(id);
      });
      bootstrap();
    });
  </script>
</body>
</html>
