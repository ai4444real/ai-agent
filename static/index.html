<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accountability Agent</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --ok: #0f766e;
      --bad: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #dbeafe, var(--bg) 45%);
    }
    .wrap {
      max-width: 1080px;
      margin: 28px auto;
      padding: 0 16px 28px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    h2 { margin: 0 0 8px; font-size: 18px; }
    h3 { margin: 0 0 8px; font-size: 15px; }
    p { margin: 0; color: var(--muted); }
    .nav {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
    }
    .tracker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .tracker {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
    }
    .choices {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .choice-btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px 9px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      min-width: 36px;
    }
    .choice-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    .choice-btn img {
      width: 18px;
      height: 18px;
      vertical-align: middle;
      margin-right: 4px;
    }
    #googleSignIn { margin-top: 10px; }
    #status {
      margin-top: 8px;
      min-height: 22px;
      font-family: Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .last-created {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      font-family: Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
    }
    .undo-btn {
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #b91c1c;
      border-radius: 999px;
      width: 24px;
      height: 24px;
      line-height: 22px;
      text-align: center;
      padding: 0;
      cursor: pointer;
      font-weight: 700;
    }
    .undo-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .toggle {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .toggle.on {
      border-color: #0f766e;
      background: #ecfdf5;
      color: #065f46;
      font-weight: 700;
    }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Accountability Agent</h1>
      <div class="nav">
        <a class="pill" href="/health">/health</a>
        <a class="pill" href="/health.html">health runner</a>
        <a class="pill" href="/summary.html">summary</a>
        <a class="pill" href="/my-rules.html">my rules</a>
      </div>
    </div>

    <div class="card">
      <h2>Login</h2>
      <p>Google login richiesto per registrare cose.</p>
      <div id="who" class="pill" style="margin-top:8px;">Not logged in</div>
      <div id="googleSignIn"></div>
    </div>

    <div class="card">
      <h2>Trackers (JSON Config)</h2>
      <button id="yesterdayToggle" class="toggle" type="button">Yesterday: OFF</button>
      <div id="status"></div>
      <div id="lastCreatedRow" class="last-created" style="display:none;">
        <span id="lastCreatedText"></span>
        <button id="undoBtn" class="undo-btn" type="button" title="Undo last insert">X</button>
      </div>
      <div id="trackers" class="tracker-grid"></div>
    </div>
  </div>

  <script>
    let googleToken = "";
    const TOKEN_STORAGE_KEY = "aa_google_id_token";
    let useYesterday = false;

    // Configurazione centralizzata dei tracker.
    // valueKind: "num" salva su value_num, "text" salva su value_text.
    const DEFAULT_TRACKER_CONFIGS = [
      {
        type: "mood",
        title: "Mood",
        valueKind: "num",
        choices: [
          { value: 1, label: "1", icon: "😡" },
          { value: 2, label: "2", icon: "😢" },
          { value: 3, label: "3", icon: "😐" },
          { value: 4, label: "4", icon: "🙂" },
          { value: 5, label: "5", icon: "😌" }
        ]
      },
      {
        type: "pasti",
        title: "Pasti",
        valueKind: "text",
        choices: [
          { value: "poco", label: "Poco", icon: "🥗" },
          { value: "giusto", label: "Giusto", icon: "🍽️" },
          { value: "tanto", label: "Tanto", icon: "🍲" },
          { value: "tantissimo", label: "Tantissimo", icon: "🍕" }
        ]
      },
      {
        type: "acqua",
        title: "Acqua",
        valueKind: "text",
        choices: [
          { value: "piccolo", label: "Piccolo", icon: "💧" },
          { value: "medio", label: "Medio", icon: "🚰" },
          { value: "grande", label: "Grande", icon: "🫗" }
        ]
      },
      {
        type: "caffe",
        title: "Caffe",
        valueKind: "text",
        choices: [
          { value: "corto", label: "Corto", icon: "☕" },
          { value: "lungo", label: "Lungo", icon: "🥤" }
        ]
      },
      {
        type: "allenamento",
        title: "Allenamento",
        valueKind: "text",
        choices: [
          { value: "male", label: "Male", icon: "😮‍💨" },
          { value: "medio", label: "Medio", icon: "😐" },
          { value: "bene", label: "Bene", icon: "💪" }
        ]
      },
      {
        type: "alcool",
        title: "Alcool",
        valueKind: "text",
        choices: [
          { value: "shot", label: "Shot", icon: "🥃" },
          { value: "birra", label: "Birra", icon: "🍺" },
          { value: "vino", label: "Vino", icon: "🍷" },
          { value: "aperitivo", label: "Aperitivo", icon: "🍸" },
          { value: "pinta", label: "Pinta", icon: "🍻" },
          { value: "superalcolico", label: "Super", icon: "🧉" }
        ]
      },
      {
        type: "tentazione",
        title: "Tentazione",
        valueKind: "text",
        choices: [
          { value: "vinto", label: "Vinto", icon: "😎" },
          { value: "perso", label: "Perso", icon: "😔" }
        ]
      }
    ];
    let trackerConfigs = JSON.parse(JSON.stringify(DEFAULT_TRACKER_CONFIGS));

    const whoNode = document.getElementById("who");
    const statusNode = document.getElementById("status");
    const trackersNode = document.getElementById("trackers");
    const yesterdayToggle = document.getElementById("yesterdayToggle");
    const lastCreatedRow = document.getElementById("lastCreatedRow");
    const lastCreatedText = document.getElementById("lastCreatedText");
    const undoBtn = document.getElementById("undoBtn");
    let lastCreatedId = null;

    function setStatus(ok, text) {
      statusNode.className = ok ? "ok" : "bad";
      statusNode.textContent = text;
    }

    function setChoiceButtonsEnabled(enabled) {
      document.querySelectorAll(".choice-btn").forEach((btn) => {
        btn.disabled = !enabled;
      });
    }

    async function api(path, options) {
      const res = await fetch(path, options);
      const text = await res.text();
      let body = text;
      try { body = JSON.parse(text); } catch (_) {}
      return { ok: res.ok, status: res.status, body };
    }

    function choiceLabel(choice) {
      const icon = choice.icon ? `${choice.icon} ` : "";
      return `${icon}${choice.label}`.trim();
    }

    function renderTrackers() {
      trackersNode.innerHTML = "";
      trackerConfigs.forEach((cfg, cfgIndex) => {
        const tracker = document.createElement("div");
        tracker.className = "tracker";

        const title = document.createElement("h3");
        title.textContent = cfg.title;

        const choices = document.createElement("div");
        choices.className = "choices";

        cfg.choices.forEach((choice, choiceIndex) => {
          const btn = document.createElement("button");
          btn.className = "choice-btn";
          btn.disabled = true;
          btn.dataset.cfg = String(cfgIndex);
          btn.dataset.choice = String(choiceIndex);

          if (choice.image) {
            btn.innerHTML = `<img src="${choice.image}" alt="">${choiceLabel(choice)}`;
          } else {
            btn.textContent = choiceLabel(choice);
          }

          btn.addEventListener("click", () => submitChoice(cfg, choice));
          choices.appendChild(btn);
        });

        tracker.appendChild(title);
        tracker.appendChild(choices);
        trackersNode.appendChild(tracker);
      });
    }

    async function submitChoice(cfg, choice) {
      if (!googleToken) {
        setStatus(false, "Login richiesto");
        return;
      }

      const payload = {
        type: cfg.type,
        value_kind: cfg.valueKind,
        use_yesterday: useYesterday,
        choice_label: choice.label,
        choice_icon: choice.icon || null,
        choice_image: choice.image || null
      };

      if (cfg.valueKind === "num") {
        payload.value_num = choice.value;
      } else {
        payload.value_text = String(choice.value);
      }

      const r = await api("/things/choice-quick", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${googleToken}`
        },
        body: JSON.stringify(payload)
      });

      if (!r.ok) {
        setStatus(false, `${cfg.type}:${choice.value} fallito (${r.status}): ${JSON.stringify(r.body)}`);
        return;
      }

      const modeLabel = useYesterday ? " [yesterday]" : "";
      setStatus(true, `${cfg.type}:${choice.value} salvato${modeLabel}. id=${r.body.id || "n/a"}`);
      if (r.body.id) {
        lastCreatedId = r.body.id;
        lastCreatedText.textContent = `last: ${cfg.type}:${choice.value} id=${r.body.id}`;
        lastCreatedRow.style.display = "flex";
      }
    }

    async function undoLastCreated() {
      if (!googleToken || !lastCreatedId) {
        return;
      }
      const ok = window.confirm("Undo ultimo inserimento?");
      if (!ok) {
        return;
      }
      undoBtn.disabled = true;
      const r = await api(`/things-mine/${lastCreatedId}`, {
        method: "DELETE",
        headers: { "Authorization": `Bearer ${googleToken}` },
      });
      undoBtn.disabled = false;
      if (!r.ok) {
        setStatus(false, `Undo failed (${r.status}): ${JSON.stringify(r.body)}`);
        return;
      }
      setStatus(true, `Undo ok. deleted id=${lastCreatedId}`);
      lastCreatedId = null;
      lastCreatedRow.style.display = "none";
      lastCreatedText.textContent = "";
    }

    function renderYesterdayToggle() {
      yesterdayToggle.className = useYesterday ? "toggle on" : "toggle";
      yesterdayToggle.textContent = useYesterday ? "Yesterday: ON" : "Yesterday: OFF";
    }

    function normalizeTrackerConfig(raw) {
      if (!Array.isArray(raw)) {
        return null;
      }
      const normalized = [];
      for (const cfg of raw) {
        if (!cfg || typeof cfg !== "object") return null;
        if (!cfg.type || !cfg.title) return null;
        if (cfg.valueKind !== "num" && cfg.valueKind !== "text") return null;
        if (!Array.isArray(cfg.choices) || cfg.choices.length < 1) return null;

        const choices = [];
        for (const ch of cfg.choices) {
          if (!ch || typeof ch !== "object") return null;
          if (ch.value === undefined || ch.value === null) return null;
          if (!ch.label) return null;
          choices.push({
            value: ch.value,
            label: String(ch.label),
            icon: ch.icon ? String(ch.icon) : undefined,
            image: ch.image ? String(ch.image) : undefined
          });
        }

        normalized.push({
          type: String(cfg.type),
          title: String(cfg.title),
          valueKind: cfg.valueKind,
          choices: choices
        });
      }
      return normalized;
    }

    async function loadTrackerConfigFromServer() {
      if (!googleToken) {
        trackerConfigs = JSON.parse(JSON.stringify(DEFAULT_TRACKER_CONFIGS));
        renderTrackers();
        return;
      }
      const r = await api("/config/tracker-config-mine", {
        method: "GET",
        headers: { "Authorization": `Bearer ${googleToken}` }
      });
      if (!r.ok) {
        trackerConfigs = JSON.parse(JSON.stringify(DEFAULT_TRACKER_CONFIGS));
        renderTrackers();
        setStatus(false, `Tracker config load failed (${r.status}), uso default.`);
        return;
      }
      const text = (r.body && r.body.text) || "";
      if (!text || !String(text).trim()) {
        trackerConfigs = JSON.parse(JSON.stringify(DEFAULT_TRACKER_CONFIGS));
        renderTrackers();
        setStatus(true, "Config tracker default (nessuna config utente salvata).");
        return;
      }
      let parsed;
      try {
        parsed = JSON.parse(text);
      } catch (_) {
        trackerConfigs = JSON.parse(JSON.stringify(DEFAULT_TRACKER_CONFIGS));
        renderTrackers();
        setStatus(false, "Tracker config JSON non valido, uso default.");
        return;
      }
      const normalized = normalizeTrackerConfig(parsed);
      if (!normalized || normalized.length < 1) {
        trackerConfigs = JSON.parse(JSON.stringify(DEFAULT_TRACKER_CONFIGS));
        renderTrackers();
        setStatus(false, "Tracker config struttura non valida, uso default.");
        return;
      }
      trackerConfigs = normalized;
      renderTrackers();
      setStatus(true, "Tracker config utente caricata.");
    }

    async function onGoogleCredential(response) {
      const token = response.credential || "";
      if (!token) {
        setStatus(false, "Google token mancante");
        return;
      }

      const verify = await api("/auth/google/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id_token: token })
      });

      if (!verify.ok) {
        setStatus(false, `Login non valido (${verify.status})`);
        setChoiceButtonsEnabled(false);
        localStorage.removeItem(TOKEN_STORAGE_KEY);
        return;
      }

      googleToken = token;
      localStorage.setItem(TOKEN_STORAGE_KEY, token);
      whoNode.textContent = `Logged in: ${verify.body.email}`;
      await loadTrackerConfigFromServer();
      setChoiceButtonsEnabled(true);
      setStatus(true, "Login OK. Seleziona una scelta da un tracker.");
    }

    async function tryStoredLogin() {
      const stored = localStorage.getItem(TOKEN_STORAGE_KEY);
      if (!stored) {
        return false;
      }
      const verify = await api("/auth/google/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id_token: stored })
      });
      if (!verify.ok) {
        localStorage.removeItem(TOKEN_STORAGE_KEY);
        return false;
      }
      googleToken = stored;
      whoNode.textContent = `Logged in: ${verify.body.email}`;
      await loadTrackerConfigFromServer();
      setChoiceButtonsEnabled(true);
      setStatus(true, "Sessione ripristinata.");
      return true;
    }

    async function bootstrap() {
      renderTrackers();
      setChoiceButtonsEnabled(false);

      const cfg = await api("/auth/google/client-id", { method: "GET" });
      const clientId = cfg.ok ? cfg.body.client_id : "";

      if (!clientId) {
        setStatus(false, "GOOGLE_CLIENT_ID non configurato");
        return;
      }
      if (!window.google || !window.google.accounts || !window.google.accounts.id) {
        setStatus(false, "Libreria Google non caricata");
        return;
      }

      google.accounts.id.initialize({
        client_id: clientId,
        callback: onGoogleCredential
      });
      google.accounts.id.renderButton(document.getElementById("googleSignIn"), {
        theme: "outline",
        size: "large",
        text: "signin_with",
        shape: "pill"
      });
      const restored = await tryStoredLogin();
      if (!restored) {
        setStatus(true, "In attesa login Google...");
      }
    }

    window.addEventListener("load", () => {
      undoBtn.addEventListener("click", undoLastCreated);
      yesterdayToggle.addEventListener("click", () => {
        useYesterday = !useYesterday;
        renderYesterdayToggle();
      });
      renderYesterdayToggle();
      setTimeout(bootstrap, 200);
    });
  </script>
</body>
</html>
